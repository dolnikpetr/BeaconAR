<!DOCTYPE html>
<html lang="cs">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>Beacon AR</title>

    <meta name="theme-color" content="#000000">

    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <!-- ===================================================== -->
    <!-- DEVELOPMENT - Disable Cache -->
    <!-- ===================================================== -->

    <meta
        http-equiv="Cache-Control"
        content="no-cache, no-store, must-revalidate"
    >

    <meta
        http-equiv="Pragma"
        content="no-cache"
    >

    <meta
        http-equiv="Expires"
        content="0"
    >

    <!-- ===================================================== -->
    <!-- PWA (disabled during development) -->
    <!-- ===================================================== -->

    <!--
    <link
        rel="manifest"
        href="manifest.json?v=2"
    >
    -->

    <link
        rel="icon"
        href="icon-192.png?v=2"
    >

    <link
        rel="stylesheet"
        href="style.css?v=2"
    >

</head>

<body>

    <!-- ===================================================== -->
    <!-- SELECT SCENARIO -->
    <!-- ===================================================== -->

    <section id="screenSelect">

        <h1>Beacon AR</h1>

        <h2>Vyber scénář</h2>

        <div id="scenarioList">

            <p>Načítám scénáře...</p>

        </div>

    </section>

    <!-- ===================================================== -->
    <!-- AR -->
    <!-- ===================================================== -->

    <section
        id="screenAR"
        hidden
    >

        <!-- Camera -->

        <video
            id="camera"
            autoplay
            muted
            playsinline
        ></video>

        <!-- Overlay -->

        <div id="overlay">
        
            <!-- Renderer -->
        
            <div id="pointContainer"></div>
        
            <!-- Debug -->
        
            <div id="debugHUD">
        
                <div id="debugGps">GPS: -</div>
        
                <div id="debugHeading">Heading: -</div>
        
                <div id="debugPoints">Points: -</div>
        
                <div id="debugAlpha">Alpha: -</div>
        
                <div id="debugAbsolute">Absolute: -</div>
        
                <div id="debugBeta">Beta: -</div>
        
                <div id="debugGamma">Gamma: -</div>
        
            </div>
        
        </div>



    </section>

    <script src="app.js?v=3"></script>

</body>

</html>
