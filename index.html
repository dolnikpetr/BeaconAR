<!DOCTYPE html>
<html lang="cs">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>Beacon AR</title>

    <style>

        * {

            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        html,
        body {

            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;

        }

        #camera {

            position: fixed;

            inset: 0;

            width: 100%;
            height: 100%;

            object-fit: cover;

            background: black;

        }

        #status {

            position: fixed;

            left: 50%;
            bottom: 30px;

            transform: translateX(-50%);

            padding: 12px 18px;

            border-radius: 10px;

            background: rgba(0,0,0,.7);

            color: white;

            font-family: Arial;

            z-index: 999;

        }

    </style>

</head>

<body>

<video
    id="camera"
    autoplay
    muted
    playsinline
></video>

<div id="status">

    Inicializuji...

</div>

<script src="app.js"></script>

</body>

</html>
